<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>image gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <h3>Image Gallery For Code Alpha</h3>
    </header>
    <div class="filter-btn">
        <button class="btn active" data-filter="all">All</button>
        <button class="btn" data-filter="nature">Nature</button>
        <button class="btn" data-filter="university">University</button>
        <button class="btn" data-filter="lab">Lab</button>
    </div>
    <section class="gallery">
        <div class="gallery-container">
            <div data-category="nature" class="picture">
                <img src="images folder/nature 1.jpg" alt="" />
            </div>
            <div data-category="university" class="picture">
                <img src="images folder/university.jpg" alt="" />
            </div>
            <div data-category="nature" class="picture">
                <img src="images folder/nature 3.jpg" alt="" />
            </div>
            <div data-category="lab" class="picture">
                <img src="images folder/bio lab.jpg" alt="" />
            </div>
            <div data-category="nature" class="picture">
                <img src="images folder/nature 2.jpg" alt="" />
            </div>
            <div data-category="lab" class="picture">
                <img src="images folder/com lab 2.jpg" alt="" />
            </div>
            <div data-category="university" class="picture">
                <img src="images folder/ground.jpg" alt="" />
            </div>
            <div data-category="university" class="picture">
                <img src="images folder/degree.jpg" alt="" />
            </div>
            <div data-category="lab" class="picture">
                <img src="images folder/com lab.jpg" alt="" />
            </div>
        </div>
    </section>

    <section class="light-box">
        <div class="big-image">
            <img id="lightbox-img" src="" alt="Expanded view" />
        </div>
        <button class="pre-btn"><i class="fa-solid fa-circle-chevron-left"></i></button>
        <button class="next-btn"><i class="fa-solid fa-circle-chevron-right"></i></button>
        <button class="close-btn"><i class="fa-solid fa-circle-xmark"></i></button>

    </section>

    <script src="script.js"></script>
</body>

</html>
