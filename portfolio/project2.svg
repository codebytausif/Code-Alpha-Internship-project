<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f2f5"/>
  
  <!-- Browser Window -->
  <rect x="20" y="20" width="760" height="560" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="40" rx="10" fill="#333"/>
  <rect x="20" y="50" width="760" height="10" fill="#ffffff"/> 
  <circle cx="50" cy="40" r="6" fill="#ff5f56"/>
  <circle cx="70" cy="40" r="6" fill="#ffbd2e"/>
  <circle cx="90" cy="40" r="6" fill="#27c93f"/>
  
  <!-- App Header -->
  <rect x="20" y="60" width="760" height="60" fill="#ffffff" stroke-bottom="#eee"/>
  <rect x="50" y="75" width="120" height="30" rx="4" fill="#ff6f00"/>
  <rect x="200" y="80" width="300" height="20" rx="10" fill="#f5f5f5"/>
  <circle cx="720" cy="90" r="15" fill="#eee"/>
  
  <!-- Banner -->
  <rect x="50" y="140" width="700" height="150" rx="8" fill="#fff3e0"/>
  <text x="400" y="220" font-family="Arial" font-size="24" fill="#ff6f00" text-anchor="middle" font-weight="bold">Summer Sale - 50% Off</text>
  
  <!-- Product Grid -->
  <rect x="50" y="320" width="210" height="220" rx="8" fill="#ffffff" stroke="#eee"/>
  <rect x="60" y="330" width="190" height="140" rx="4" fill="#eceff1"/>
  <rect x="60" y="480" width="100" height="15" rx="2" fill="#cfd8dc"/>
  <rect x="60" y="505" width="60" height="15" rx="2" fill="#ff6f00"/>
  
  <rect x="295" y="320" width="210" height="220" rx="8" fill="#ffffff" stroke="#eee"/>
  <rect x="305" y="330" width="190" height="140" rx="4" fill="#eceff1"/>
  <rect x="305" y="480" width="100" height="15" rx="2" fill="#cfd8dc"/>
  <rect x="305" y="505" width="60" height="15" rx="2" fill="#ff6f00"/>
  
  <rect x="540" y="320" width="210" height="220" rx="8" fill="#ffffff" stroke="#eee"/>
  <rect x="550" y="330" width="190" height="140" rx="4" fill="#eceff1"/>
  <rect x="550" y="480" width="100" height="15" rx="2" fill="#cfd8dc"/>
  <rect x="550" y="505" width="60" height="15" rx="2" fill="#ff6f00"/>
  
</svg>
