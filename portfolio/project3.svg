  <circle cx="70" cy="40" r="6" fill="#ffbd2e"/>
  <circle cx="90" cy="40" r="6" fill="#27c93f"/>
  
  <!-- Sidebar -->
  <rect x="20" y="60" width="60" height="520" fill="#252526"/>
  <rect x="35" y="80" width="30" height="30" rx="4" fill="#007acc"/>
  <rect x="35" y="130" width="30" height="30" rx="4" fill="#444"/>
  <rect x="35" y="180" width="30" height="30" rx="4" fill="#444"/>
  
  <!-- Code Area -->
  <rect x="80" y="60" width="700" height="520" fill="#1e1e1e"/>
  
  <!-- Code Lines -->
  <text x="100" y="100" font-family="Consolas, monospace" font-size="16" fill="#569cd6">const</text>
  <text x="155" y="100" font-family="Consolas, monospace" font-size="16" fill="#4fc1ff">portfolio</text>
  <text x="240" y="100" font-family="Consolas, monospace" font-size="16" fill="#d4d4d4">=</text>
  <text x="260" y="100" font-family="Consolas, monospace" font-size="16" fill="#ce9178">"My Work"</text>;
  
  <text x="100" y="130" font-family="Consolas, monospace" font-size="16" fill="#569cd6">function</text>
  <text x="180" y="130" font-family="Consolas, monospace" font-size="16" fill="#dcdcaa">createMagic</text>
  <text x="280" y="130" font-family="Consolas, monospace" font-size="16" fill="#ffd700">()</text>
  <text x="305" y="130" font-family="Consolas, monospace" font-size="16" fill="#d4d4d4">{</text>
  
  <rect x="120" y="150" width="200" height="10" rx="2" fill="#6a9955"/>
  <rect x="120" y="170" width="300" height="10" rx="2" fill="#6a9955"/>
  
  <text x="120" y="200" font-family="Consolas, monospace" font-size="16" fill="#c586c0">return</text>
  <text x="180" y="200" font-family="Consolas, monospace" font-size="16" fill="#ce9178">"Awesome Website"</text>;
  
  <text x="100" y="230" font-family="Consolas, monospace" font-size="16" fill="#d4d4d4">}</text>
  
  <!-- Preview Window Overlay -->
