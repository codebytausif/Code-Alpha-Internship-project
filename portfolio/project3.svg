<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#121212"/>
  
  <!-- Browser Window -->
  <rect x="20" y="20" width="760" height="560" rx="10" fill="#1e1e1e" stroke="#333" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="40" rx="10" fill="#2d2d2d"/>
  <rect x="20" y="50" width="760" height="10" fill="#1e1e1e"/> 
