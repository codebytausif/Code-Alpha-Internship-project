  <rect x="400" y="250" width="350" height="30" rx="8" fill="#333"/>
  <rect x="400" y="270" width="350" height="10" fill="#252526"/>
  <text x="530" y="270" font-family="Arial" font-size="12" fill="#ccc">Preview</text>
  
  <circle cx="575" cy="350" r="40" fill="#007acc"/>
  <rect x="450" y="410" width="250" height="10" rx="2" fill="#555"/>
  <rect x="450" y="430" width="200" height="10" rx="2" fill="#555"/>
  <rect x="450" y="450" width="150" height="10" rx="2" fill="#555"/>
  
